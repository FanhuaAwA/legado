name: Discord Push Notify

on:
  push:
    branches:
      - main
      - master

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send push notification to Discord channel
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_FORUM_TAG: ${{ vars.DISCORD_FORUM_TAG }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          AUTHOR_ICON: ${{ github.event.sender.avatar_url }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.event.head_commit.id }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          COMPARE_URL: ${{ github.event.compare }}
          COMMIT_COUNT: ${{ toJson(github.event.commits) }}
        run: |
          set -e

          # ---------- helpers ----------
          api_call() {
            curl -s --fail-with-body \
              -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
              -H "Content-Type: application/json" \
              "$@"
          }

          # ---------- detect channel type ----------
          CHANNEL_INFO=$(api_call "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID")
          CHANNEL_TYPE=$(echo "$CHANNEL_INFO" | jq -r '.type')
          echo "Channel type: $CHANNEL_TYPE"

          # ---------- count commits ----------
          COUNT=$(echo "$COMMIT_COUNT" | jq 'if type=="array" then length else 1 end')
          echo "Commit count: $COUNT"

          # ---------- build embed ----------
          SHA_SHORT="${COMMIT_SHA:0:7}"
          # 截断提交信息到 256 字符（Discord embed title 限制）
          TITLE_MSG="${COMMIT_MSG:0:256}"

          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          EMBED=$(jq -n \
            --arg title "$TITLE_MSG" \
            --arg url "$COMMIT_URL" \
            --arg author "$AUTHOR" \
            --arg author_icon "$AUTHOR_ICON" \
            --arg branch "$BRANCH" \
            --arg sha "$SHA_SHORT" \
            --arg compare_url "$COMPARE_URL" \
            --arg count "$COUNT" \
            --arg repo "$REPO" \
            --arg timestamp "$TIMESTAMP" \
            '{
              title: $title,
              url: $url,
              timestamp: $timestamp,
              color: 5814783,
              author: {
                name: $author,
                icon_url: $author_icon
              },
              fields: [
                { name: "📦 仓库", value: $repo, inline: true },
                { name: "🌿 分支", value: $branch, inline: true },
                { name: "📝 提交数", value: $count, inline: true }
              ],
              footer: {
                text: "\($sha) • \($repo)"
              }
            }')

          # ---------- send ----------
          if [ "$CHANNEL_TYPE" = "15" ]; then
            # 论坛频道：需要创建帖子
            TAG_NAME="${DISCORD_FORUM_TAG:-github-notify}"

            # 获取论坛可用标签
            TAGS=$(echo "$CHANNEL_INFO" | jq '[.available_tags[] | {id: .id, name: .name}]')
            TAG_ID=$(echo "$TAGS" | jq -r --arg name "$TAG_NAME" '.[] | select(.name == $name) | .id')

            THREAD_NAME="[${REPO}] ${BRANCH} — ${SHA_SHORT}"

            if [ -n "$TAG_ID" ] && [ "$TAG_ID" != "null" ]; then
              THREAD_PAYLOAD=$(jq -n \
                --arg name "$THREAD_NAME" \
                --argjson embed "$EMBED" \
                --arg tag_id "$TAG_ID" \
                '{
                  name: $name,
                  message: { embeds: [$embed] },
                  applied_tags: [$tag_id]
                }')
            else
              echo "Warning: tag '$TAG_NAME' not found, posting without tag"
              THREAD_PAYLOAD=$(jq -n \
                --arg name "$THREAD_NAME" \
                --argjson embed "$EMBED" \
                '{
                  name: $name,
                  message: { embeds: [$embed] }
                }')
            fi

            api_call -X POST "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID/threads" \
              -d "$THREAD_PAYLOAD"

          elif [ "$CHANNEL_TYPE" = "0" ] || [ "$CHANNEL_TYPE" = "5" ]; then
            # 普通文字频道 / 公告频道
            MESSAGE=$(jq -n --argjson embed "$EMBED" '{embeds: [$embed]}')
            api_call -X POST "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID/messages" \
              -d "$MESSAGE"

          else
            echo "Error: unsupported channel type $CHANNEL_TYPE (expected 0=text, 5=announcement, 15=forum)"
            exit 1
          fi

          echo "✅ Notification sent successfully"
