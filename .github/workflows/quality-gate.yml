name: Quality Gate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_HTTP_TIMEOUT: "120"
  CARGO_NET_RETRY: "10"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  quality-gate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Fetch Cargo dependencies
        shell: pwsh
        run: |
          $attempts = 3
          $lastExitCode = 0

          for ($attempt = 1; $attempt -le $attempts; $attempt++) {
            Write-Host "cargo fetch attempt $attempt of $attempts"
            cargo fetch --locked
            $lastExitCode = $LASTEXITCODE

            if ($lastExitCode -eq 0) {
              exit 0
            }

            if ($attempt -lt $attempts) {
              $delay = 20 * $attempt
              Write-Warning "cargo fetch failed with exit code $lastExitCode; retrying in $delay seconds"
              Start-Sleep -Seconds $delay
            }
          }

          exit $lastExitCode

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Script references check
        run: node scripts/ci/check-scripts.mjs

      - name: Frontend lint
        run: pnpm oxlint --type-aware --type-check . --max-warnings 100

      - name: Frontend build
        run: pnpm build

      - name: Rust fmt check
        run: cargo fmt --all -- --check

      - name: Cargo check reader-core
        run: cargo check -p reader-core

      - name: Cargo test reader-core
        run: cargo test -p reader-core

      - name: Cargo check tauri
        run: cargo check -p legado-tauri

      - name: Command contract check
        run: node scripts/ci/check-command-contract.mjs

      - name: Environment summary
        run: node scripts/ci/check-env.mjs --json
